<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Steven's personal research hub — bioinformatics, machine learning, and ocean-themed projects.">
    <title>Steven's Ocean Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <!-- 深海背景動畫 Canvas -->
    <canvas id="ocean-canvas"></canvas>

    <!-- Header -->
    <header>
        <div class="container">
            <h1>
                <span class="moon-icon">🌙</span>
                Steven's Ocean Hub
                <span class="moon-icon">🌊</span>
            </h1>
            <nav>
                <a href="/">[ Home ]</a>
                <a href="/about">[ About ]</a>
                <a href="/blog">[ Blog ]</a>
                <a href="/projects">[ Projects ]</a>
                <a href="/hackmd">[ HackMD ]</a>
                <a href="/api-tutorial">[ API Doc ]</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>🌊 Exploring the deep — Research · Code · Discovery</p>
            <p style="font-size: 0.78rem; margin-top: 4px;">
                訪客人次：{{ visitor_stats.total_visits if visitor_stats else 0 }} &nbsp;|&nbsp; © 2025–2026 Steven Su · NYCU
            </p>
        </div>
    </footer>

    <!-- 深海氣泡 + 月光波紋 背景動畫 -->
    <script>
        const canvas = document.getElementById('ocean-canvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // --- 氣泡 ---
        const bubbles = [];
        const BUBBLE_COUNT = 55;

        for (let i = 0; i < BUBBLE_COUNT; i++) {
            bubbles.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight + window.innerHeight,
                r: Math.random() * 5 + 1.5,
                speed: Math.random() * 0.45 + 0.15,
                opacity: Math.random() * 0.35 + 0.05,
                drift: (Math.random() - 0.5) * 0.4,
                phase: Math.random() * Math.PI * 2
            });
        }

        // --- 月光粒子 ---
        const moonParticles = [];
        const MOON_COUNT = 30;

        for (let i = 0; i < MOON_COUNT; i++) {
            moonParticles.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight * 0.5,
                r: Math.random() * 1.8 + 0.5,
                opacity: Math.random() * 0.4 + 0.05,
                speed: Math.random() * 0.15 + 0.05,
                pulse: Math.random() * Math.PI * 2
            });
        }

        // --- 光束 ---
        const lightRays = [];
        const RAY_COUNT = 5;
        for (let i = 0; i < RAY_COUNT; i++) {
            lightRays.push({
                x: (window.innerWidth / (RAY_COUNT + 1)) * (i + 1) + (Math.random() - 0.5) * 120,
                width: Math.random() * 60 + 30,
                opacity: Math.random() * 0.06 + 0.02,
                speed: Math.random() * 0.002 + 0.001,
                phase: Math.random() * Math.PI * 2
            });
        }

        let tick = 0;

        function draw() {
            tick++;

            // 深海漸層背景
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#020d1a');
            grad.addColorStop(0.4, '#061a2e');
            grad.addColorStop(1, '#0a1f3a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 光束
            lightRays.forEach(ray => {
                ray.phase += ray.speed;
                const alpha = ray.opacity * (0.7 + 0.3 * Math.sin(ray.phase));
                const rayGrad = ctx.createLinearGradient(ray.x, 0, ray.x, canvas.height * 0.75);
                rayGrad.addColorStop(0, `rgba(200, 223, 245, ${alpha})`);
                rayGrad.addColorStop(0.5, `rgba(30, 127, 196, ${alpha * 0.4})`);
                rayGrad.addColorStop(1, 'transparent');
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(ray.x - ray.width, 0);
                ctx.lineTo(ray.x + ray.width, 0);
                ctx.lineTo(ray.x + ray.width * 0.3, canvas.height * 0.75);
                ctx.lineTo(ray.x - ray.width * 0.3, canvas.height * 0.75);
                ctx.closePath();
                ctx.fillStyle = rayGrad;
                ctx.fill();
                ctx.restore();
            });

            // 月光粒子 (上半部)
            moonParticles.forEach(p => {
                p.y += p.speed;
                p.pulse += 0.02;
                if (p.y > canvas.height * 0.6) {
                    p.y = -5;
                    p.x = Math.random() * canvas.width;
                }
                const alpha = p.opacity * (0.6 + 0.4 * Math.sin(p.pulse));
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 223, 245, ${alpha})`;
                ctx.fill();
            });

            // 氣泡
            bubbles.forEach(b => {
                b.y -= b.speed;
                b.x += Math.sin(tick * 0.01 + b.phase) * b.drift;
                b.phase += 0.02;

                if (b.y < -10) {
                    b.y = canvas.height + 10;
                    b.x = Math.random() * canvas.width;
                }

                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(0, 245, 212, ${b.opacity})`;
                ctx.lineWidth = 0.8;
                ctx.stroke();

                // 小反光
                ctx.beginPath();
                ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.25, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 223, 245, ${b.opacity * 0.8})`;
                ctx.fill();
            });

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>

</html>
